server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # This is the MAGIC line for React Router!
        # If Nginx can't find a file (like /login), it sends the user back to index.html
        # so React can load the correct page.
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets like images and CSS to make the app incredibly fast
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
