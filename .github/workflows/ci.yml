name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm install

    - name: Lint Frontend
      working-directory: ./frontend
      run: npm run lint

    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm install

    - name: Test Backend
      working-directory: ./backend
      run: npx vitest run

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Docker Images
      run: docker compose build
